  <!-- Subtitle -->
  <text x="600" y="195" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#8b949e">Your OpCo Resource Pack — From Evaluation to Launch</text>
