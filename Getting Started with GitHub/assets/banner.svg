    <text x="265" y="17" text-anchor="middle" font-family="monospace" font-size="12" fill="#a371f7">Copilot</text>
    <rect x="325" y="0" width="90" height="26" rx="13" fill="#1f6feb" opacity="0.2"/>
    <text x="370" y="17" text-anchor="middle" font-family="monospace" font-size="12" fill="#58a6ff">Admin</text>
    <rect x="430" y="0" width="90" height="26" rx="13" fill="#238636" opacity="0.25"/>
    <text x="475" y="17" text-anchor="middle" font-family="monospace" font-size="12" fill="#3fb950">Trial</text>
