        <text x="57" y="23" text-anchor="middle" fill="#f0f6fc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600">Runners</text>
      </g>
      <g transform="translate(270 0)">
        <rect width="114" height="36" rx="18" fill="#21262d" stroke="#30363d"/>
        <text x="57" y="23" text-anchor="middle" fill="#f0f6fc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600">Security</text>
      </g>
      <g transform="translate(398 0)">
        <rect width="130" height="36" rx="18" fill="#21262d" stroke="#30363d"/>
        <text x="65" y="23" text-anchor="middle" fill="#f0f6fc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600">Migration</text>
      </g>
