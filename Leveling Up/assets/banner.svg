  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
  <!-- Graduation cap icon -->
  <g transform="translate(550, 70)">
    <path d="M50 10L0 30L50 50L100 30Z" fill="#58a6ff" opacity="0.9"/>
    <path d="M20 35V55L50 65L80 55V35" fill="#58a6ff" opacity="0.6"/>
    <rect x="90" y="30" width="3" height="35" fill="#f78166" opacity="0.8"/>
    <circle cx="91.5" cy="68" r="4" fill="#f78166" opacity="0.8"/>
  </g>
  <!-- Title -->
  <text x="600" y="165" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="46" font-weight="700" fill="#f0f6fc">Leveling Up</text>
  <!-- Subtitle -->
  <text x="600" y="205" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#8b949e">Learning, Certifications &amp; Skills Development</text>
  <!-- Pill badges -->
  <g transform="translate(290, 230)">
    <rect x="0" y="0" width="120" height="26" rx="13" fill="#238636" opacity="0.25"/>
    <text x="60" y="17" text-anchor="middle" font-family="monospace" font-size="12" fill="#3fb950">Certifications</text>
    <rect x="135" y="0" width="90" height="26" rx="13" fill="#1f6feb" opacity="0.2"/>
    <text x="180" y="17" text-anchor="middle" font-family="monospace" font-size="12" fill="#58a6ff">Courses</text>
    <rect x="240" y="0" width="90" height="26" rx="13" fill="#da3633" opacity="0.2"/>
    <text x="285" y="17" text-anchor="middle" font-family="monospace" font-size="12" fill="#f78166">Agentic AI</text>
    <rect x="345" y="0" width="90" height="26" rx="13" fill="#8957e5" opacity="0.2"/>
    <text x="390" y="17" text-anchor="middle" font-family="monospace" font-size="12" fill="#a371f7">Skills</text>
    <rect x="450" y="0" width="100" height="26" rx="13" fill="#1f6feb" opacity="0.2"/>
    <text x="500" y="17" text-anchor="middle" font-family="monospace" font-size="12" fill="#58a6ff">Classroom</text>
  </g>
