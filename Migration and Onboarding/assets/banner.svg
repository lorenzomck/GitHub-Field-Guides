<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Migration and Onboarding banner</title>
  <desc id="desc">Dark GitHub-themed banner for Migration and Onboarding resources.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="220" y1="40" x2="940" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#79c0ff"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#58a6ff" stop-opacity="0.9"/>
      <stop offset="0.8" stop-color="#79c0ff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#79c0ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="0" y="0" width="1200" height="300" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="300" rx="24" fill="url(#bg)"/>
  <rect x="24" y="20" width="1152" height="4" rx="2" fill="url(#line)"/>
  <rect x="24" y="276" width="1152" height="4" rx="2" fill="url(#line)"/>

  <g opacity="0.22" fill="#8b949e">
    <circle cx="64" cy="58" r="2"/><circle cx="64" cy="92" r="2"/><circle cx="64" cy="126" r="2"/><circle cx="64" cy="160" r="2"/><circle cx="64" cy="194" r="2"/><circle cx="64" cy="228" r="2"/>
    <circle cx="98" cy="58" r="2"/><circle cx="98" cy="92" r="2"/><circle cx="98" cy="126" r="2"/><circle cx="98" cy="160" r="2"/><circle cx="98" cy="194" r="2"/><circle cx="98" cy="228" r="2"/>
    <circle cx="132" cy="58" r="2"/><circle cx="132" cy="92" r="2"/><circle cx="132" cy="126" r="2"/><circle cx="132" cy="160" r="2"/><circle cx="132" cy="194" r="2"/><circle cx="132" cy="228" r="2"/>
    <circle cx="1068" cy="58" r="2"/><circle cx="1068" cy="92" r="2"/><circle cx="1068" cy="126" r="2"/><circle cx="1068" cy="160" r="2"/><circle cx="1068" cy="194" r="2"/><circle cx="1068" cy="228" r="2"/>
    <circle cx="1102" cy="58" r="2"/><circle cx="1102" cy="92" r="2"/><circle cx="1102" cy="126" r="2"/><circle cx="1102" cy="160" r="2"/><circle cx="1102" cy="194" r="2"/><circle cx="1102" cy="228" r="2"/>
    <circle cx="1136" cy="58" r="2"/><circle cx="1136" cy="92" r="2"/><circle cx="1136" cy="126" r="2"/><circle cx="1136" cy="160" r="2"/><circle cx="1136" cy="194" r="2"/><circle cx="1136" cy="228" r="2"/>
  </g>

  <g filter="url(#glow)">
    <path d="M228 150H422" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>
    <path d="M398 126L422 150L398 174" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="162" y="103" width="66" height="94" rx="14" stroke="url(#accent)" stroke-width="6"/>
    <path d="M184 128H205" stroke="#79c0ff" stroke-width="6" stroke-linecap="round"/>
    <path d="M184 150H205" stroke="#79c0ff" stroke-width="6" stroke-linecap="round"/>
    <path d="M184 172H195" stroke="#79c0ff" stroke-width="6" stroke-linecap="round"/>
    <rect x="422" y="116" width="96" height="68" rx="16" stroke="url(#accent)" stroke-width="6"/>
    <path d="M450 150H489" stroke="#79c0ff" stroke-width="6" stroke-linecap="round"/>
    <path d="M470 130V170" stroke="#79c0ff" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  </g>

  <text x="560" y="112" fill="#f0f6fc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="700" letter-spacing="0.4px">Migration &amp; Onboarding</text>
  <text x="560" y="152" fill="#c9d1d9" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="500">From Any Platform to GitHub — Seamlessly</text>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600">
    <g transform="translate(560 188)">
      <rect width="92" height="36" rx="18" fill="#21262d" stroke="#30363d"/>
      <text x="46" y="23" text-anchor="middle" fill="#79c0ff">GitLab</text>
    </g>
    <g transform="translate(662 188)">
      <rect width="136" height="36" rx="18" fill="#21262d" stroke="#30363d"/>
      <text x="68" y="23" text-anchor="middle" fill="#79c0ff">Azure DevOps</text>
    </g>
    <g transform="translate(808 188)">
      <rect width="110" height="36" rx="18" fill="#21262d" stroke="#30363d"/>
      <text x="55" y="23" text-anchor="middle" fill="#79c0ff">Bitbucket</text>
    </g>
    <g transform="translate(928 188)">
      <rect width="72" height="36" rx="18" fill="#21262d" stroke="#30363d"/>
      <text x="36" y="23" text-anchor="middle" fill="#79c0ff">SVN</text>
    </g>
    <g transform="translate(1010 188)">
      <rect width="126" height="36" rx="18" fill="#1f6feb" fill-opacity="0.18" stroke="#58a6ff"/>
      <text x="63" y="23" text-anchor="middle" fill="#f0f6fc">Onboarding</text>
    </g>
  </g>
</svg>
