<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Platform Engineering banner</title>
  <desc id="desc">Dark GitHub themed banner for Platform Engineering with stack icon and automation badges.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="316" y1="52" x2="1020" y2="248" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#3fb950"/>
    </linearGradient>
    <linearGradient id="softAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58a6ff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#3fb950" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="300" rx="18" fill="url(#bg)"/>
  <rect x="24" y="24" width="1152" height="252" rx="16" stroke="url(#softAccent)"/>

  <g opacity="0.12" fill="#8b949e">
    <circle cx="70" cy="55" r="2.2"/><circle cx="115" cy="55" r="2.2"/><circle cx="160" cy="55" r="2.2"/><circle cx="205" cy="55" r="2.2"/><circle cx="250" cy="55" r="2.2"/><circle cx="295" cy="55" r="2.2"/>
    <circle cx="70" cy="100" r="2.2"/><circle cx="115" cy="100" r="2.2"/><circle cx="160" cy="100" r="2.2"/><circle cx="205" cy="100" r="2.2"/><circle cx="250" cy="100" r="2.2"/><circle cx="295" cy="100" r="2.2"/>
    <circle cx="70" cy="145" r="2.2"/><circle cx="115" cy="145" r="2.2"/><circle cx="160" cy="145" r="2.2"/><circle cx="205" cy="145" r="2.2"/><circle cx="250" cy="145" r="2.2"/><circle cx="295" cy="145" r="2.2"/>
    <circle cx="70" cy="190" r="2.2"/><circle cx="115" cy="190" r="2.2"/><circle cx="160" cy="190" r="2.2"/><circle cx="205" cy="190" r="2.2"/><circle cx="250" cy="190" r="2.2"/><circle cx="295" cy="190" r="2.2"/>
    <circle cx="70" cy="235" r="2.2"/><circle cx="115" cy="235" r="2.2"/><circle cx="160" cy="235" r="2.2"/><circle cx="205" cy="235" r="2.2"/><circle cx="250" cy="235" r="2.2"/><circle cx="295" cy="235" r="2.2"/>
    <circle cx="905" cy="55" r="2.2"/><circle cx="950" cy="55" r="2.2"/><circle cx="995" cy="55" r="2.2"/><circle cx="1040" cy="55" r="2.2"/><circle cx="1085" cy="55" r="2.2"/><circle cx="1130" cy="55" r="2.2"/>
    <circle cx="905" cy="100" r="2.2"/><circle cx="950" cy="100" r="2.2"/><circle cx="995" cy="100" r="2.2"/><circle cx="1040" cy="100" r="2.2"/><circle cx="1085" cy="100" r="2.2"/><circle cx="1130" cy="100" r="2.2"/>
    <circle cx="905" cy="145" r="2.2"/><circle cx="950" cy="145" r="2.2"/><circle cx="995" cy="145" r="2.2"/><circle cx="1040" cy="145" r="2.2"/><circle cx="1085" cy="145" r="2.2"/><circle cx="1130" cy="145" r="2.2"/>
    <circle cx="905" cy="190" r="2.2"/><circle cx="950" cy="190" r="2.2"/><circle cx="995" cy="190" r="2.2"/><circle cx="1040" cy="190" r="2.2"/><circle cx="1085" cy="190" r="2.2"/><circle cx="1130" cy="190" r="2.2"/>
    <circle cx="905" cy="235" r="2.2"/><circle cx="950" cy="235" r="2.2"/><circle cx="995" cy="235" r="2.2"/><circle cx="1040" cy="235" r="2.2"/><circle cx="1085" cy="235" r="2.2"/><circle cx="1130" cy="235" r="2.2"/>
  </g>

  <rect x="0" y="18" width="1200" height="4" fill="url(#accent)" opacity="0.9"/>
  <rect x="0" y="278" width="1200" height="4" fill="url(#accent)" opacity="0.9"/>

  <g transform="translate(148 72)" filter="url(#glow)">
    <rect x="0" y="64" width="96" height="20" rx="10" fill="#58a6ff" opacity="0.18"/>
    <rect x="18" y="28" width="96" height="20" rx="10" fill="#3fb950" opacity="0.16"/>
    <rect x="36" y="-8" width="96" height="20" rx="10" fill="#58a6ff" opacity="0.22"/>
    <rect x="0" y="72" width="96" height="20" rx="10" stroke="#58a6ff" stroke-width="3"/>
    <rect x="18" y="36" width="96" height="20" rx="10" stroke="#3fb950" stroke-width="3"/>
    <rect x="36" y="0" width="96" height="20" rx="10" stroke="#58a6ff" stroke-width="3"/>
    <path d="M48 10h72M30 46h72M12 82h72" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  </g>

  <g>
    <text x="600" y="126" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="50" font-weight="700" fill="#f0f6fc">Platform Engineering</text>
    <text x="600" y="170" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" font-weight="400" fill="#8b949e">Build Golden Paths for Developer Productivity</text>
  </g>

  <g transform="translate(358 210)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle">
    <rect x="0" y="0" width="110" height="30" rx="15" fill="#1f6feb" opacity="0.18"/>
    <text x="55" y="19" fill="#79c0ff">Templates</text>

    <rect x="126" y="0" width="110" height="30" rx="15" fill="#1f6feb" opacity="0.12"/>
    <text x="181" y="19" fill="#79c0ff">Rulesets</text>

    <rect x="252" y="0" width="80" height="30" rx="15" fill="#238636" opacity="0.18"/>
    <text x="292" y="19" fill="#56d364">IDP</text>

    <rect x="348" y="0" width="136" height="30" rx="15" fill="#238636" opacity="0.14"/>
    <text x="416" y="19" fill="#56d364">Automation</text>
  </g>
