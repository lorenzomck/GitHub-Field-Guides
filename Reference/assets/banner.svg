  <!-- Book icon -->
  <g transform="translate(560, 70)">
    <rect x="5" y="0" width="35" height="45" rx="3" fill="#a371f7" opacity="0.8"/>
    <rect x="40" y="0" width="35" height="45" rx="3" fill="#58a6ff" opacity="0.8"/>
    <rect x="37" y="0" width="6" height="45" fill="#0d1117"/>
    <line x1="15" y1="12" x2="32" y2="12" stroke="#0d1117" stroke-width="2" opacity="0.5"/>
    <line x1="15" y1="20" x2="30" y2="20" stroke="#0d1117" stroke-width="2" opacity="0.5"/>
    <line x1="48" y1="12" x2="65" y2="12" stroke="#0d1117" stroke-width="2" opacity="0.5"/>
    <line x1="48" y1="20" x2="63" y2="20" stroke="#0d1117" stroke-width="2" opacity="0.5"/>
  </g>
  <!-- Title -->
  <text x="600" y="165" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="46" font-weight="700" fill="#f0f6fc">Reference</text>
  <!-- Subtitle -->
  <text x="600" y="205" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#8b949e">Technical Guides, Comparisons &amp; Configuration</text>
  <!-- Pill badges -->
  <g transform="translate(300, 225)">
    <rect x="0" y="0" width="100" height="26" rx="13" fill="#8957e5" opacity="0.2"/>
    <text x="50" y="17" text-anchor="middle" font-family="monospace" font-size="12" fill="#a371f7">Licensing</text>
    <rect x="115" y="0" width="110" height="26" rx="13" fill="#1f6feb" opacity="0.2"/>
    <text x="170" y="17" text-anchor="middle" font-family="monospace" font-size="12" fill="#58a6ff">Comparisons</text>
    <rect x="240" y="0" width="90" height="26" rx="13" fill="#238636" opacity="0.25"/>
    <text x="285" y="17" text-anchor="middle" font-family="monospace" font-size="12" fill="#3fb950">Agents</text>
    <rect x="345" y="0" width="100" height="26" rx="13" fill="#1f6feb" opacity="0.2"/>
    <text x="395" y="17" text-anchor="middle" font-family="monospace" font-size="12" fill="#58a6ff">Prompting</text>
    <rect x="460" y="0" width="110" height="26" rx="13" fill="#8957e5" opacity="0.2"/>
    <text x="515" y="17" text-anchor="middle" font-family="monospace" font-size="12" fill="#a371f7">Workshops</text>
