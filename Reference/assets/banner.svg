<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a371f7"/>
      <stop offset="50%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#3fb950"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>
  <!-- Decorative grid dots -->
  <g opacity="0.08" fill="#a371f7">
    <circle cx="50" cy="50" r="2"/><circle cx="100" cy="50" r="2"/><circle cx="150" cy="50" r="2"/><circle cx="200" cy="50" r="2"/><circle cx="250" cy="50" r="2"/><circle cx="300" cy="50" r="2"/>
    <circle cx="50" cy="100" r="2"/><circle cx="100" cy="100" r="2"/><circle cx="150" cy="100" r="2"/><circle cx="200" cy="100" r="2"/><circle cx="250" cy="100" r="2"/><circle cx="300" cy="100" r="2"/>
    <circle cx="50" cy="150" r="2"/><circle cx="100" cy="150" r="2"/><circle cx="150" cy="150" r="2"/><circle cx="200" cy="150" r="2"/><circle cx="250" cy="150" r="2"/><circle cx="300" cy="150" r="2"/>
    <circle cx="50" cy="200" r="2"/><circle cx="100" cy="200" r="2"/><circle cx="150" cy="200" r="2"/><circle cx="200" cy="200" r="2"/><circle cx="250" cy="200" r="2"/><circle cx="300" cy="200" r="2"/>
    <circle cx="50" cy="250" r="2"/><circle cx="100" cy="250" r="2"/><circle cx="150" cy="250" r="2"/><circle cx="200" cy="250" r="2"/><circle cx="250" cy="250" r="2"/><circle cx="300" cy="250" r="2"/>
    <circle cx="900" cy="50" r="2"/><circle cx="950" cy="50" r="2"/><circle cx="1000" cy="50" r="2"/><circle cx="1050" cy="50" r="2"/><circle cx="1100" cy="50" r="2"/><circle cx="1150" cy="50" r="2"/>
    <circle cx="900" cy="100" r="2"/><circle cx="950" cy="100" r="2"/><circle cx="1000" cy="100" r="2"/><circle cx="1050" cy="100" r="2"/><circle cx="1100" cy="100" r="2"/><circle cx="1150" cy="100" r="2"/>
    <circle cx="900" cy="150" r="2"/><circle cx="950" cy="150" r="2"/><circle cx="1000" cy="150" r="2"/><circle cx="1050" cy="150" r="2"/><circle cx="1100" cy="150" r="2"/><circle cx="1150" cy="150" r="2"/>
    <circle cx="900" cy="200" r="2"/><circle cx="950" cy="200" r="2"/><circle cx="1000" cy="200" r="2"/><circle cx="1050" cy="200" r="2"/><circle cx="1100" cy="200" r="2"/><circle cx="1150" cy="200" r="2"/>
    <circle cx="900" cy="250" r="2"/><circle cx="950" cy="250" r="2"/><circle cx="1000" cy="250" r="2"/><circle cx="1050" cy="250" r="2"/><circle cx="1100" cy="250" r="2"/><circle cx="1150" cy="250" r="2"/>
  </g>
  <!-- Accent line top -->
